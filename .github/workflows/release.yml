name: Release Signed APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create keystore from base64 secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > keystore/hermes-release.jks
          echo "Keystore created: $(ls -la keystore/hermes-release.jks)"

      - name: Create secrets.properties from secrets
        run: |
          cat > keystore/secrets.properties << EOF
          KEYSTORE_PATH=../keystore/hermes-release.jks
          KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "secrets.properties created"

      - name: Assemble release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Bundle release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          jarsigner -verify -verbose -certs "$APK_PATH" | head -20

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false